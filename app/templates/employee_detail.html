<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CorpCorp — {{ record.username }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --panel:     #13161e;
      --border:    #1e2330;
      --accent:    #2f80ed;
      --text:      #e2e6f0;
      --muted:     #6b7280;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 48px 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(47,128,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(47,128,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrapper {
      max-width: 560px;
      margin: 0 auto;
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .wordmark span { color: var(--accent); }

    a.back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    a.back:hover { color: var(--text); }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .card-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .role-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .role-admin    { background: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .role-manager  { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .role-employee { background: rgba(47,128,237,0.1); color: #60a5fa; border: 1px solid rgba(47,128,237,0.2); }

    .fields {
      padding: 20px 28px;
      display: grid;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .field value {
      display: block;
      font-size: 14px;
      font-family: var(--mono);
    }

    .message-block {
      padding: 20px 28px;
    }

    .message-block label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .message-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <div class="wordmark"><span>CorpCorp</span> &nbsp;//&nbsp; Admin</div>
      <a class="back" href="/employees">&larr; Directory</a>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>{{ record.username }}</h1>
        <span class="role-badge role-{{ record.role }}">{{ record.role }}</span>
      </div>

      <div class="fields">
        <div class="field">
          <label>Email</label>
          <value>{{ record.email }}</value>
        </div>
        <div class="field">
          <label>Department</label>
          <value>{{ record.department }}</value>
        </div>
        <div class="field">
          <label>Salary</label>
          <value>${{ "%.2f"|format(record.salary) }}</value>
        </div>
        <div class="field">
          <label>SSN</label>
          <value>{{ record.ssn }}</value>
        </div>
        <div class="field">
          <label>Notes</label>
          <value>{{ record.notes }}</value>
        </div>
      </div>

      <div class="message-block">
        <label>Personal Message</label>
        <div class="message-text">{{ record.message }}</div>
      </div>
    </div>
  </div>
</body>
</html>
