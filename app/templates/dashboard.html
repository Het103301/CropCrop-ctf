<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CorpCorp Portal — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --panel:     #13161e;
      --border:    #1e2330;
      --accent:    #2f80ed;
      --text:      #e2e6f0;
      --muted:     #6b7280;
      --success:   #22c55e;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(47,128,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(47,128,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      animation: slidein 0.4s ease forwards;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 1px;
    }

    .badge {
      display: inline-block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--success);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .role {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 32px;
    }

    a.logout {
      display: inline-block;
      padding: 10px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    a.logout:hover { color: var(--text); border-color: var(--muted); }

    @keyframes slidein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">&#10003; Authenticated</div>
    <h1>Welcome back, {{ username }}</h1>
    <p>You have successfully accessed the employee portal.</p>
    <p class="role">Role: {{ role }}</p>
    <a class="logout" href="/logout">Sign out</a>
  </div>
</body>
</html>
